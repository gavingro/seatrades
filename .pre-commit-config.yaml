repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        # app.py (Streamlit entry script) and the app/ package are both top-level
        # module "app"; mypy errors on the duplicate. Exclude the thin entry script.
        # Type-checking only — no effect on `streamlit run app.py` at deploy time.
        exclude: ^app\.py$
        additional_dependencies:
          - pandera[mypy]
          - pandas-stubs
          - types-PyYAML
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
